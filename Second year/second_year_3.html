<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="photos/icon.png">
  <title>Second year</title>
  <style>
    #background {
      position: fixed;       
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgb(219, 219, 219);
      background-size: cover;
      z-index: -1;           
    }

    .foreground {
      background-color: #f9f9f9c8;
      border-top-left-radius: 30px;  
      border-top-right-radius: 30px;
      border-radius: 30px;
      padding: 40px 20px;
      max-width: 900px;
      height: 782px; 
      margin: 0 auto;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      color: #1a1a3d;
    }

    h3 {
      text-align: center;
      margin-bottom: 40px;
      font-weight: 700;
      font-size: 20px;
      color: #000000;
    }

    .main-container {
      max-width: 800px;
      width: 100%;
      align-self: center;
      margin-top: 20%;
    }

    .top-row,
    .bottom-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      color: #1a1a3d;
      text-decoration: none;
      max-width: 45%;
      vertical-align: top;
    }

    a:hover p {
      color: rgb(231, 11, 48);
    }

    .lorem:hover {
      color: rgb(231, 11, 48) !important;
      cursor: pointer;
    }
    
    a:has(.lorem:hover) p {
      color: #1a1a3d;
    }

    p {
      font-weight: 700;
      font-size: 18px;
      margin: 0 0 12px 0;
      text-align: left;
    }

    .lorem {
      display: block;
      text-align: left;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
    }

    .img {
      width: 100%;
      height: auto;
      margin-bottom: 12px;
    }

    .bottom-nav {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        width: 100%;
        margin-top: auto;
        padding-top: 30px;
        box-sizing: border-box;
    }

    .bottom-nav > *:first-child {
        justify-self: start;
    }

    .bottom-nav .about-link {
        font-weight: 700;
        font-size: 18px;
        justify-self: center;
        text-align: center;
        white-space: nowrap; 
        max-width: none;
    }

    .bottom-nav .about-link:hover {
        color: rgb(231, 11, 48);
    }

    .bottom-nav > *:last-child {
        justify-self: end;
    }

    .back_btn, .next_btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: #1a1a3d;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        cursor: pointer;
        border: none;
    }

    .modal-overlay {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        background: rgba(20, 20, 20, 0.55);
        padding: 24px;
        z-index: 1000;
    }
    .modal-overlay.is-open { display: grid; }
    .modal {
        width: min(680px, 100%);
        max-height: min(90vh, 720px);
        overflow-y: auto;
        background: #fffdf7;
        border-radius: 24px;
        border: 1px solid rgba(36, 24, 20, 0.16);
        box-shadow: 0 30px 80px rgba(36, 24, 20, 0.25);
        padding: 28px 28px 22px;
        position: relative;
    }
    .modal-close {
        position: absolute;
        top: 18px;
        right: 18px;
        border: none;
        background: rgba(36, 24, 20, 0.08);
        color: #1a1a3d;
        font-size: 1.6rem;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
    }
    .modal-content { display: grid; gap: 18px; }
    .modal-label {
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.75rem;
        color: #54633f;
    }
    .modal h3 {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        color: #5f2d21;
        text-align: left;
    }
    .modal-info { display: grid; gap: 14px; }
    .modal-info p {
        margin: 0;
        line-height: 1.7;
        font-weight: normal;
        text-align: left;
    }
    .modal-credits { font-style: italic; color: #666; margin-top: 10px; }

    @media (max-width: 768px) {
        .foreground {
            margin: 20px auto;
            width: 90%;
            padding: 30px 20px;
            box-sizing: border-box;
            height: auto;
        }
        .top-row, .bottom-row {
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        .main-container { 
          margin-top: 10%; 
        }
        a { 
          max-width: 100%; 
          width: 100%;
        }
    }
  </style>
</head>
<body>
  <div id="background"></div>

  <div class="foreground">
      <h3>PROGETTI 2AA</h3>
    
    <div class="main-container">
      <div class="top-row">
        <a class="top" href="villa_drusi.html">
          <img src="photos/Villa_Drusilla.jpg" class="img" title="Villa Drusilla">
          <p>Villa Drusilla</p>
          <span class="lorem modal-trigger" data-id="villadrusi">More...</span>
        </a>
        <a class="top" href="dioclez_e-book.html">
          <img src="photos/P_Dioc.png" class="img" title="E-book Diocleziano">
          <p>E-book Diocleziano</p>
          <span class="lorem modal-trigger" data-id="diocleziano">More...</span>
        </a>
      </div>
    </div>
    
    <div class="bottom-nav">
      <a href="second_year_2.html" style="width: auto;"><button class="back_btn">Back</button></a>
      <a href="about-us_3.html" class="about-link">About us</a>
      <div class="nav-spacer"></div> </div>

  </div>

  <div class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
          <button type="button" class="modal-close" aria-label="Chiudi popup">×</button>
          <div class="modal-content">
              <p class="modal-label">Scheda Progetto</p>
              <h3 id="modal-title"></h3>
              <div class="modal-info">
                  <p class="modal-description"></p>
                  <p class="modal-credits"></p>
              </div>
          </div>
      </div>
  </div>

  <script>
      const modalData = {
          "villadrusi": {
              title: "Villa Drusilla",
              description: "Villa Drusilla è un sito realizzato per spiegare la iconica villa della moglie di Nerone, parla delle sue generalità per poi andare più in profondità parlando delle piante e degli uccelli presenti al interno del giardino, per ogni uccello e pianta è presente una scheda tecnica contenente l'habitat, le caratteristiche e l'interesse storico, in aggiunta si può anche ascoltare il verso degli uccelli e vedere una animazione del giardino che prende vita per un esperienza da togliere il fiato.",
              credits: "Credits: Bosco Caterina, Furlanetto Nicolo, Vendrame Matteo."
          },
          "diocleziano": {
              title: "E-book Diocleziano",
              description: "Il palazzo di Diocleziano è un e-book che parla della storia di Diocleziano, la sua città in confronto tra ieri e oggi, la struttura del celebre palazzo e dei miti e leggende che circolano su di esso.",
              credits: "Credits: Garzetta Jacopo, Pupulin Jacopo, Visentin Giacomo, Voci Samuel."
          }
      };

      const modalOverlay = document.querySelector(".modal-overlay");
      const modalTitle = document.querySelector("#modal-title");
      const modalDescription = document.querySelector(".modal-description");
      const modalCredits = document.querySelector(".modal-credits");
      const modalClose = document.querySelector(".modal-close");

      const openModal = (id) => {
          const data = modalData[id];
          if (data) {
              modalTitle.textContent = data.title;
              modalDescription.textContent = data.description;
              modalCredits.textContent = data.credits;
              
              modalOverlay.classList.add("is-open");
              modalOverlay.setAttribute("aria-hidden", "false");
          }
      };

      const closeModal = () => {
          modalOverlay.classList.remove("is-open");
          modalOverlay.setAttribute("aria-hidden", "true");
      };

      document.querySelectorAll(".modal-trigger").forEach(trigger => {
          trigger.addEventListener("click", (e) => {
              e.preventDefault();
              const id = trigger.getAttribute("data-id");
              openModal(id);
          });
      });

      modalClose.addEventListener("click", closeModal);
      modalOverlay.addEventListener("click", (event) => {
          if (event.target === modalOverlay) closeModal();
      });
      document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && modalOverlay.classList.contains("is-open")) {
              closeModal();
          }
      });
  </script>
</body>
</html>
