<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="photos\icon.png">
    <title>Ponte De Pria</title>
</head>

<style>
    #background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgb(219, 219, 219);
        background-size: cover;
        z-index: -1;
    }

    .foreground {
        background-color: #f9f9f9c8;
        border-top-left-radius: 30px;
        border-top-right-radius: 30px;
        border-radius: 30px;
        padding: 40px 20px;
        max-width: 900px;
        height: auto;
        margin: 0 auto;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      color: #1a1a3d;
    }

    h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: 700;
      font-size: 20px;
      color: #000000;
    }

    img{
        height: auto;
        max-width: 100%;
    }
    
    .button-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 100%;
        margin: 20px auto 0 auto; 
    }

    .back_btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: #ffffff;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }
    .next_btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: white;
        color: black;
        border: 1px solid #000000;
        text-decoration: none;
        border-radius: 8px;
        cursor: pointer;
    }
    @media (max-width: 768px) {
        .foreground {
            margin: 20px auto;
            width: 90%;
            padding: 30px 20px;
            box-sizing: border-box;
            height: auto;
        }
        .top-row, .bottom-row {
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        .main-container { 
        margin-top: 10%; 
        }
        a { 
            max-width: 100%; 
            width: 100%; 
        }
        .bottom-nav { 
            flex-direction: row; 
            gap: 80px; 
        }
        .button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 100%;
            margin: 20px auto 0 auto;
            margin-left: 50%; 
        }
    }
</style>

<body>
    <div id="background"></div>

    <div class="foreground">

        <h3>PONTE DA PRIA</h3>

        <div>
            <img src="Ponti/13.png" alt="da_pria">
        </div>

        <div class="button-container">
            <a>
                <button class="back_btn"></button>
            </a>

            <a href="p_Da_pria_2.html">
                <button class="next_btn">Page 2</button>
            </a>
        </div>
</body>
</html>
