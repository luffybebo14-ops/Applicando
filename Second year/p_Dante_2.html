<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="photos\icon.png">
    <title>About us</title>
</head>

<style>
    #background {
        position: fixed;      
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: white;
        background-size: cover;
        z-index: -1;           
    }

    .foreground {
        background-color: #f9f9fc;
        border-top-left-radius: 30px;
        border-top-right-radius: 30px;
        border-radius: 30px;
        padding: 40px 20px;
        max-width: 900px;
        height: auto;
        margin: 0 auto;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      color: #1a1a3d;
    }

    h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: 700;
      font-size: 20px;
      color: #000000;
    }

    img{
        height: auto;
        max-width: 100%;
    }

    .button-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 100%;
        margin: 20px auto 0 auto; 
    }

    .back_btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: #ffffff;
        color: black;
        border: 1px solid #000000;
        text-decoration: none;
        border-radius: 8px;
        cursor: pointer;
    }
    .next_btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: white;
        color: black;
        border: 1px solid #000000;
        text-decoration: none;
        border-radius: 8px;
        cursor: pointer;
    }
</style>

<body>
    <div id="background"></div>

    <div class="foreground">

        <h3>PONTE DANTE</h3>

        <div>
            <img src="Ponti/11.png" alt="dante">
        </div>

        <div class="button-container">
            <a href="p_Dante.html">
                <button class="back_btn">Page 1</button>
            </a>

            <a href="p_Dante_3.html">
                <button class="next_btn">Page 3</button>
            </a>
        </div>

</body>
</html>
