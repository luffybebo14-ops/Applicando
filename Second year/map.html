<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treviso Sull'Acqua</title>
    <link rel="icon" type="image/x-icon" href="photos\icon.png">

    <style>

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            background-size: cover;
            z-index: -1;
        }

        .foreground {
            background-color: #f9f9fc;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            border-radius: 30px;
            padding: 40px 20px;
            max-width: 900px;
            height: auto;
            margin: 0 auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            color: #1a1a3d;
        }
        
        h3 {
            text-align: center;
            margin-bottom: 40px;
            font-weight: 700;
            font-size: 20px;
            color: #000000;
        }
        .map-book-container {
            display: flex;
            justify-content: space-between;
        }
        #div_book, #div_map {
            width: 48%;
            height: 500px;
            margin: 0 1%;
        }
        #div_book iframe, #div_map iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .back_btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #1a1a3d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="background"></div>
    
    <div class="foreground">
        <h3>TREVISO SULL'ACQUA</h3>

        <div class="map-book-container">
            <div id="div_book">
                <iframe title="E-book" loading="lazy"
                    src="https://www.canva.com/design/DAG3oA7txFM/KNJW-ueEeQHPGOIi7BFJiw/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
                </iframe>
            </div>

            <div id="div_map">
                <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1DnXagn9Q91YSVjE1TAWpaYiEjHtMuvs&ehbc=2E312F&noprof=1" title="Embedded Site"></iframe>
            </div>
        </div>

        <br>
        <a href="second_year_2.html">
            <button class="back_btn">Back</button>
        </a>
    </div>
</body>
</html>
