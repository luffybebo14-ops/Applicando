<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modellino Acquedotto</title>
    <link rel="icon" type="image/x-icon" href="photos\icon.png">
    <style>
        #background {
          position: fixed;  
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: white;
          background-size: cover;
          z-index: -1;         
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, Arial, sans-serif;
            margin: 0;
            height: 100vh; /* Locks body to exactly the height of the screen */
            overflow: hidden; /* Prevents any scrolling */
            color: #1a1a3d;
            display: flex;
            align-items: center; /* Centers the foreground vertically */
            justify-content: center; /* Centers the foreground horizontally */
        }

        .foreground {
          background-color: #f9f9fc;
          border-radius: 30px;
          padding: 30px 20px;
          width: 90%; /* Adapts width on mobile */
          max-width: 900px;
          height: 95vh; /* Takes up 95% of the screen height */
          box-sizing: border-box; /* Ensures padding is calculated inside the height */
          display: flex;
          flex-direction: column; /* Stacks title, video, and buttons vertically */
          box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        h3 {
          text-align: center;
          margin-top: 0;
          margin-bottom: 20px;
          font-weight: 700;
          font-size: 20px;
          color: #000000;
          flex-shrink: 0; /* Prevents the title from being squished */
        }

        .ebook-container {
            width: 100%;
            flex-grow: 1; /* Tells the container to take up ALL available remaining space */
            box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16);
            border-radius: 8px;
            overflow: hidden;
            background-color: #000; /* Adds black letterboxing around the video if needed */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvaVideo {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensures the video scales perfectly without stretching or cropping */
        }
        
        .button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 20px;
            flex-shrink: 0; /* Prevents the buttons from being squished */
        }

        .back_btn, #toggleBtn {
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
        }

        .back_btn {
            background-color: #1a1a3d;
            color: white;
            border: none;
        }

        #toggleBtn {
            background-color: white;
            color: black;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    
    <div id="background"></div>

    <div class="foreground">
        <h3>MODELLINO ACQUEDOTTO ROMANO</h3>

        <div class="ebook-container">
            <video id="canvaVideo" autoplay muted loop playsinline>
                <source src="photos/Acquedotto_video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="button-container">
            <a href="second_year.html">
                <button class="back_btn">Back</button>
            </a>
            <button id="toggleBtn">Pause</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('canvaVideo');
        const button = document.getElementById('toggleBtn');

        button.addEventListener('click', () => {
            if (video.paused) {
            video.play();
            button.textContent = 'Pause';
            } else {
            video.pause();
            button.textContent = 'Play';
            }
        });
    </script>

</body>
</html>
