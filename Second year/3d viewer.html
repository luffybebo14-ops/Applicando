<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="photo/x-icon" href="photos/icon.png">
    <title>3D Viewer</title>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        #background {
            position: fixed;       
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            background-size: cover;
            z-index: -1;
        }

        .foreground {
            background-color: #f9f9fc;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            border-radius: 30px;
            padding: 40px 20px;
            max-width: 900px;
            height: auto;
            margin: 0 auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        color: #1a1a3d;
        }

        h3 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 20px;
        font-weight: 700;
        font-size: 20px;
        color: #000000;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-sizing: border-box;
        }

        model-viewer {
            width: 100%;
            height: 500px;
            background-color: #eee;
            border-radius: 15px;
            margin-bottom: 30px;
            --poster-color: transparent;
        }

        .ar-button {
            background-color: white;
            border-radius: 8px;
            border: 1px solid #4285f4;
            color: #4285f4;
            padding: 10px 20px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #1a1a3d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="background"></div>

    <div class="foreground">
        <h3>MY 3D MODEL VIEWER</h3>
            
        <model-viewer 
            src="GLB/ponte.glb"  
            alt="A 3D model of Ponte" 
            ar 
            ar-modes="scene-viewer quick-look webxr" 
            ar-scale="auto" 
            camera-controls 
            auto-rotate 
            shadow-intensity="1">
            
            <button slot="ar-button" class="ar-button">
                AR
            </button>
        </model-viewer>

        <model-viewer 
            src="GLB/pontos" 
            alt="A 3D model of Pontos" 
            ar 
            ar-modes="scene-viewer quick-look webxr" 
            ar-scale="auto" 
            camera-controls 
            auto-rotate 
            shadow-intensity="1">

            <button slot="ar-button" class="ar-button">
                AR
            </button>
        </model-viewer>

        <a href="second_year_2.html" class="back-btn">Back</a>
    </div>

</body>
</html>
